<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin: 0; background: #131313; color: #e5e2e1; font-family: sans-serif; }
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 240px; position: fixed; top:0;left:0;bottom:0; background:#1a1a1a; display:flex; }
  .main { margin-left: 240px; flex: 1; padding: 36px; min-width: 0; }
  .page { display: none !important; }
  .page.active { display: block !important; }
  .mob-bottom-nav { display: none; position: fixed; bottom:0; left:0; right:0; background:#222; }
  .mob-nav-btn { flex:1; padding:12px; color:white; background:none; border:none; font-size:12px; }
  #sync-overlay { position:fixed; inset:0; background:#131313; z-index:9999; display:flex; align-items:center; justify-content:center; }
  #sync-overlay.hidden { display:none; }
  @media (max-width: 768px) {
    .sidebar { display: none !important; }
    .mob-bottom-nav { display: flex !important; }
    .main { margin-left: 0 !important; padding: 16px 14px 80px !important; }
  }
</style>
</head>
<body>
<div id="sync-overlay">
  <button onclick="launchApp()" style="background:#00f5d4;color:#000;padding:16px 32px;border:none;border-radius:8px;font-size:16px;cursor:pointer;">Sign In (tap to launch)</button>
</div>
<div class="app">
  <nav class="sidebar"><div style="padding:20px;color:#666">Sidebar</div></nav>
  <nav class="mob-bottom-nav" id="mob-bottom-nav">
    <button class="mob-nav-btn" onclick="goTo('overview')">🏠 Home</button>
    <button class="mob-nav-btn" onclick="goTo('training')">💪 Train</button>
    <button class="mob-nav-btn" onclick="goTo('sleep')">😴 Sleep</button>
  </nav>
  <main class="main">
    <div id="page-overview" class="page active" style="min-height:200vh;background:#1a3a1a;padding:20px;">
      <h1>DASHBOARD</h1>
      <p>Very tall page to simulate real content. Lots of cards here.</p>
    </div>
    <div id="page-training" class="page" style="background:#3a1a1a;padding:20px;">
      <h1>TRAINING</h1><p>Training content here.</p>
    </div>
    <div id="page-sleep" class="page" style="background:#1a1a3a;padding:20px;">
      <h1>SLEEP</h1><p>Sleep content here.</p>
    </div>
  </main>
</div>
<div id="log" style="position:fixed;top:0;right:0;background:rgba(0,0,0,0.8);padding:8px;font-size:11px;"></div>
<script>
function goTo(page) {
  document.querySelectorAll('.page').forEach(function(p) {
    p.classList.remove('active');
    p.style.display = 'none';
  });
  var target = document.getElementById('page-' + page);
  if (target) {
    target.classList.add('active');
    target.style.display = 'block';
  }
  window.scrollTo({top:0,behavior:'auto'});
  document.getElementById('log').textContent = 'goTo: ' + page;
}
function launchApp() {
  document.getElementById('sync-overlay').classList.add('hidden');
  // simulate what launchApp does — render dashboard
  document.getElementById('log').textContent = 'launchApp called';
}
</script>
</body>
</html>
